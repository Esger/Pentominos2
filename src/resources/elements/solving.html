<template>
    <require from="resources/value-converters/thousands-value-converter"></require>
    <template if.bind="solvingPanelVisible">
        <div class="buttonRow">
            <button class="button"
                    title="find all solutions"
                    click.delegate="autoSolve()"
                    touchstart.trigger="autoSolve()">
                    <icon class="fa fa-fast-forward fa-lg"></icon>
            </button>
            <button class="button"
                    disabled.bind="!canStop"
                    title="stop solutions worker"
                    click.delegate="stop()"
                    touchstart.trigger="stop()">
                    <icon class="fa fa-stop fa-lg"></icon>
            </button>
            <button class="button"
                    disabled.bind="canStop || solutionsInQueue || noSolutions"
                    title="delete these solutions"
                    click.delegate="delete()"
                    touchstart.trigger="delete()">
                    <icon class="fa fa-trash fa-lg"></icon>
            </button>
            <button class="button"
                    disabled.bind="canStop"
                    title="close panel"
                    click.delegate="close()"
                    touchstart.trigger="close()">
                    <icon class="fa fa-close fa-lg"></icon>
            </button>
        </div>
        <div class="progressRow">
            <div class="integrated-progress"
                 title="Tried: ${positionsTried | thousands} | Found: ${solutionsFound} | Shown: ${currentCount}">
                <progress class="progress-tried" value.bind="positionsLog" max="8.176"></progress>
                <div class="progress-meter">
                    <progress class="progress-shown" value.bind="currentCount" max.bind="total"></progress>
                    <div class="progress-text">
                        <span class="text-tried">${positionsTried | thousands}</span> pos / 
                        <span class="text-found">${solutionsFound}</span> / 
                        <span class="text-shown">${currentCount}</span> sol
                    </div>
                </div>
                <progress class="progress-found" value.bind="solutionsFound" max.bind="total"></progress>
            </div>
        </div>
        <p class="message"
           if.bind="message">${message}</p>
    </template>
</template>
