<template>
    <require from="resources/value-converters/thousands-value-converter"></require>
    <div class="solverControls" if.bind="solvingPanelVisible">
        <div class="buttonRow">
            <button class="button"
                    title="find all solutions"
                    click.delegate="autoSolve()"
                    touchstart.trigger="autoSolve()">
                    <icon class="fa fa-fast-forward fa-lg"></icon>
            </button>
            <button class="button"
                    disabled.bind="!canStop"
                    title="stop solutions worker"
                    click.delegate="stop()"
                    touchstart.trigger="stop()">
                    <icon class="fa fa-stop fa-lg"></icon>
            </button>
            <button class="button"
                    disabled.bind="canStop || solutionsInQueue || noSolutions"
                    title="delete these solutions"
                    click.delegate="delete()"
                    touchstart.trigger="delete()">
                    <icon class="fa fa-trash fa-lg"></icon>
            </button>
            <button class="button"
                    disabled.bind="canStop"
                    title="close panel"
                    click.delegate="close()"
                    touchstart.trigger="close()">
                    <icon class="fa fa-close fa-lg"></icon>
            </button>
        </div>
        <div class="solverControls__progressRow">
            <div class="solverProgress"
                 title="Tried: ${positionsTried | thousands} | Found: ${solutionsFound} | Shown: ${currentCount}">
                <progress class="solverProgress__tried" value.bind="positionsLog" max="8.176"></progress>
                <div class="solverProgress__meter">
                    <progress class="solverProgress__shown" value.bind="solutionsShown" max.bind="total"></progress>
                    <div class="solverProgress__text">
                        <span class="solverProgress__value solverProgress__value--tried">${positionsTried | thousands}</span> pos / 
                        <span class="solverProgress__value solverProgress__value--found">${solutionsFound}</span> fnd / 
                        <span class="solverProgress__value solverProgress__value--shown">${solutionsShown}</span> shwn
                    </div>
                </div>
                <progress class="solverProgress__found" value.bind="solutionsFound" max.bind="total"></progress>
            </div>
        </div>
        <p class="message"
           if.bind="message">${message}</p>
    </div>
</template>
